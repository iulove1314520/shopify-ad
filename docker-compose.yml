# Docker Compose 服务编排配置
services:
  # 后端 API 服务
  api:
    # 从当前目录的 Dockerfile 构建镜像
    build:
      context: .
      dockerfile: Dockerfile
    # 从项目根目录加载环境变量
    env_file:
      - .env
    # 将宿主机 38417 端口映射到容器 38417 端口
    ports:
      - "38417:38417"
    # 挂载 SQLite 数据卷，确保容器重建后数据仍然保留
    volumes:
      - sqlite_data:/app/data
    # 健康检查：访问应用的 /health 接口
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:38417/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s
    # 容器异常退出后自动重启
    restart: unless-stopped

# 命名卷定义
volumes:
  # 用于持久化 SQLite 数据文件
  sqlite_data:
